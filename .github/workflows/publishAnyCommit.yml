name: Publish to npm

on:
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        if: github.repository == 'tanmayy91/lavalink-client'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun.js
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.9

            - name: Install dependencies
              run: bun install --no-frozen-lockfile

            - name: Build package
              run: bun run build

            - name: Publish to npm
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  TOKEN="${NODE_AUTH_TOKEN:-$NPM_TOKEN}"
                  if [ -z "$TOKEN" ]; then
                    echo "NPM_TOKEN secret is required to publish." >&2
                    exit 1
                  fi
                  # Explicitly configure npm to use the provided auth token
                  npm config set //registry.npmjs.org/:_authToken "$TOKEN"
                  npm publish --access public
